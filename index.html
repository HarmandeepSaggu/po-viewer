<!-- <!DOCTYPE html>
<html>
<head>
<title>PO Review Dashboard</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family: "Segoe UI", Arial, sans-serif;
  background:#f4f6f9;
}

/* Header */

.header{
  background:#1f2937;
  color:white;
  padding:15px 25px;
  font-size:20px;
  font-weight:600;
}

/* Layout */

.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* Left side PDF */

.left{
  width:50%;
  border-right:1px solid #ddd;
  background:white;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* Right panel */

.right{
  width:50%;
  padding:25px;
  overflow:auto;
}

/* JSON box */

.json-box{
  background:#0f172a;
  color:#22c55e;
  padding:20px;
  border-radius:8px;
  margin-top:10px;
  font-size:14px;
  overflow:auto;
}

/* Buttons */

.actions{
  margin-top:25px;
  display:flex;
  gap:15px;
}

button{
  border:none;
  padding:12px 20px;
  font-size:15px;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}

.approve{
  background:#22c55e;
  color:white;
}

.approve:hover{
  background:#16a34a;
}

.deny{
  background:#ef4444;
  color:white;
}

.deny:hover{
  background:#dc2626;
}

/* Status */

.status{
  margin-top:15px;
  font-weight:600;
}

</style>
</head>

<body>

<div class="header">
PO Document Review
</div>

<div class="container">

<!-- LEFT PANEL -->
<div class="left">
<iframe id="pdfFrame"></iframe>
</div>

<!-- RIGHT PANEL -->

<div class="right">

<h2>Extracted JSON Data</h2>

<div class="json-box">
<pre id="jsonData"></pre>
</div>

<div class="actions">
<button class="approve" onclick="approvePO()">Approve</button>
<button class="deny" onclick="denyPO()">Deny</button>
</div>

<div class="status" id="statusMsg"></div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const pdf = params.get("pdf")
const json = params.get("json")

if(pdf){
  document.getElementById("pdfFrame").src = pdf
}

if(json){
  const decoded = decodeURIComponent(json)
  document.getElementById("jsonData").textContent =
  JSON.stringify(JSON.parse(decoded), null, 2)
}

/* Buttons */

function approvePO(){
  document.getElementById("statusMsg").innerHTML =
  "✅ PO Approved"
}

function denyPO(){
  document.getElementById("statusMsg").innerHTML =
  "❌ PO Denied"
}

</script>

</body>
</html>
