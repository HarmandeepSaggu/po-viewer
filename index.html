<!DOCTYPE html>
<html>
<head>
<title>PO Review Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI, Arial;
background:#f4f6f9;
}

/* HEADER */

.header{
background:#1f2937;
color:white;
padding:15px 25px;
font-size:20px;
font-weight:600;
}

/* LAYOUT */

.container{
display:flex;
height:calc(100vh - 60px);
}

/* PDF SIDE */

.left{
width:50%;
background:white;
border-right:1px solid #ddd;
overflow:auto;
}

#pdfContainer{
padding:20px;
}

/* JSON PANEL */

.right{
width:50%;
padding:25px;
overflow:auto;
}

.json-box{
background:#0f172a;
color:#22c55e;
padding:20px;
border-radius:8px;
font-size:14px;
white-space:pre-wrap;
}

.json-value{
cursor:pointer;
padding:2px 4px;
border-radius:4px;
}

.json-value:hover{
background:#334155;
}

/* PDF TEXT LAYER */

.textLayer span.highlight{
background:yellow;
}

/* BUTTONS */

.actions{
margin-top:20px;
display:flex;
gap:15px;
}

button{
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.approve{
background:#22c55e;
color:white;
}

.deny{
background:#ef4444;
color:white;
}

.status{
margin-top:15px;
font-weight:600;
}

</style>
</head>

<body>

<div class="header">PO Document Review</div>

<div class="container">

<!-- PDF SIDE -->
<div class="left">
<div id="pdfContainer"></div>
</div>

<!-- JSON SIDE -->
<div class="right">

<h2>Extracted JSON Data</h2>

<div class="json-box" id="jsonData"></div>

<div class="actions">
<button class="approve" onclick="approvePO()">Approve</button>
<button class="deny" onclick="denyPO()">Deny</button>
</div>

<div class="status" id="statusMsg"></div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const pdfURL = params.get("pdf")
const jsonParam = params.get("json")

let jsonData = {}

if(jsonParam){
jsonData = JSON.parse(decodeURIComponent(jsonParam))
renderJSON(jsonData)
}

/* ---------- JSON RENDER ---------- */

function renderJSON(obj){

let html = ""

Object.keys(obj).forEach(key => {

let value = obj[key]

html += `<div>
<strong>${key}:</strong>
<span class="json-value" onclick="highlightText('${value}')">${value}</span>
</div>`

})

document.getElementById("jsonData").innerHTML = html
}

/* ---------- PDF LOAD ---------- */

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"

async function loadPDF(url){

const pdf = await pdfjsLib.getDocument(url).promise

for(let pageNum=1; pageNum<=pdf.numPages; pageNum++){

const page = await pdf.getPage(pageNum)

const viewport = page.getViewport({scale:1.3})

const canvas = document.createElement("canvas")
const context = canvas.getContext("2d")

canvas.height = viewport.height
canvas.width = viewport.width

const container = document.createElement("div")
container.style.position="relative"

container.appendChild(canvas)

document.getElementById("pdfContainer").appendChild(container)

await page.render({
canvasContext:context,
viewport:viewport
}).promise

/* TEXT LAYER */

const textLayerDiv = document.createElement("div")
textLayerDiv.className="textLayer"
textLayerDiv.style.position="absolute"
textLayerDiv.style.left=0
textLayerDiv.style.top=0
textLayerDiv.style.height=viewport.height+"px"
textLayerDiv.style.width=viewport.width+"px"

container.appendChild(textLayerDiv)

const textContent = await page.getTextContent()

pdfjsLib.renderTextLayer({
textContent,
container:textLayerDiv,
viewport,
textDivs:[]
})

}

}

/* ---------- TEXT HIGHLIGHT ---------- */

function highlightText(text){

clearHighlights()

const spans = document.querySelectorAll(".textLayer span")

spans.forEach(span => {

if(span.textContent.includes(text)){
span.classList.add("highlight")
}

})

}

/* ---------- CLEAR ---------- */

function clearHighlights(){

document.querySelectorAll(".highlight").forEach(el=>{
el.classList.remove("highlight")
})

}

/* ---------- PDF → JSON ---------- */

document.addEventListener("mouseup", () => {

const selected = window.getSelection().toString().trim()

if(!selected) return

const jsonValues = document.querySelectorAll(".json-value")

jsonValues.forEach(el => {

if(el.textContent.includes(selected)){
el.style.background="yellow"
}

})

})

/* ---------- BUTTONS ---------- */

function approvePO(){
document.getElementById("statusMsg").innerHTML="✅ PO Approved"
}

function denyPO(){
document.getElementById("statusMsg").innerHTML="❌ PO Denied"
}

/* ---------- START ---------- */

if(pdfURL){
loadPDF(pdfURL)
}

</script>

</body>
</html>
